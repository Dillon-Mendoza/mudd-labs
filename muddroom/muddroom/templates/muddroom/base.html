{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudd Labs</title>
    <link rel="stylesheet" href="{% static 'css/muddroom.css' %}">
</head>
<body>

<header class="page-header">
    <div class="header-inner">
        <a href="/" class="logo-lockup">
            <img src="{% static 'img/muddlabs-logo.svg' %}" alt="Mudd Labs">
        </a>
        <nav class="header-nav">
            {% if user.is_authenticated %}
                <span class="header-user">{{ user.username }}</span>
                <form method="POST" action="{% url 'logout' %}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="header-logout">Log out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Log in</a>
            {% endif %}
        </nav>
    </div>
</header>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

</body>
</html>
